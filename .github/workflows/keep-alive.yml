name: Keep API Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          curl -fsS https://elidem-api-1.onrender.com/health \
            -o /dev/null \
            --max-time 30 \
            || echo "Ping failed (cold start still booting)"
